set cpu history=100

set quiet

set on
on afail goto failure

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Test Setup
;;

; Set up data for tests.

d 00002e00 aabbccdd
d 00003e00 11223344
d -b 3e04 ff
d 00003e08 f0f1f2f3
d 02001e00 a5b5c5d5

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Absolute Address Mode
;; MOVB $0x02001e00,%r0

d pc 0

d -b 00 87
d -b 01 7F
d -b 02 00
d -b 03 1e
d -b 04 00
d -b 05 02
d -b 06 40
s

assert r0=000000a5
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Absolute Address Mode
;; MOVB $0x02001e01,%r0

d pc 0

d -b 00 87
d -b 01 7F
d -b 02 01
d -b 03 1e
d -b 04 00
d -b 05 02
d -b 06 40
s

assert r0=000000b5
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Absolute Address Mode
;; MOVB $0x02001e02,%r0

d pc 0

d -b 00 87
d -b 01 7F
d -b 02 02
d -b 03 1e
d -b 04 00
d -b 05 02
d -b 06 40
s

assert r0=000000c5
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVH - Absolute Address Mode
;; MOVH $0x02001e00,%r0

d pc 0

d -b 00 86
d -b 01 7F
d -b 02 00
d -b 03 1e
d -b 04 00
d -b 05 02
d -b 06 40
s

assert r0=0000a5b5
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Absolute Address Mode
;; MOVW $0x02001e00,%r0

d pc 0

d -b 00 84
d -b 01 7F
d -b 02 00
d -b 03 1e
d -b 04 00
d -b 05 02
d -b 06 40
s

assert r0=a5b5c5d5
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Absolute Address Mode
;; MOVB $0x3e00,%r0

d pc 0

d -b 00 87
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40
s

assert r0=00000011
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Absolute Address Mode to Memory
;; MOVB $0x3e00,$0x4000

d pc 0

d -b 00 87
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 00
d -b 08 40
d -b 09 00
d -b 0a 00
s

assert 4000=11000000
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVH - Absolute Address Mode
;; MOVH $0x3e00,%r0

d pc 0

d -b 00 86
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40
s

assert r0=00001122
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVH - Absolute Address Mode to Memory
;; MOVH $0x3e00,$0x4000

d pc 0

d -b 00 86
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 00
d -b 08 40
d -b 09 00
d -b 0a 00
s

assert 4000=11220000
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVH - Absolute Address Mode
;; MOVH $0x3E00,%r0

d pc 0

d -b 00 86
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40
s

assert r0=00001122
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Absolute Address Mode
;; MOVW $0x3e00,%r0

d pc 0
d -b 00 84
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40
s

assert r0=11223344
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Literal MOVB
;; MOVB &-1,%r7
;;
;; Moving the byte 'ff' into R1 should sign-extend, because the literal value
;; is considered to be signed.

d pc 0

d -b 00 87
d -b 01 ff
d -b 02 47

s

assert r7=ffffffff
assert psw=200004


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVB
;; MOVB $0x3e04,%r0
;;
;; Moving the byte 'ff' into R0 should not cause sign extension, because
;; the value read from memory is treated as an un-signed byte and is not 
;; sign-extended
;;

d pc 0

d -b 00 87
d -b 01 7F
d -b 02 04
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40

s

assert r0=000000ff
; N flag should be set.
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVW
;; MOVW $0x3e08,$0x2e00
;;

d 2e00 aaaaaaaa

d pc 0

d -b 00 84
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 00
d -b 08 2e
d -b 09 00
d -b 0a 00

s

assert 2e00=f0f1f2f3
; Negative flag should be set
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVW on odd address should cause exception
;; MOVW $0x3e08,$0x2e01
;;

d 2e00 aaaaaaaa

d pc 0

d -b 00 84
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 01
d -b 08 2e
d -b 09 00
d -b 0a 00

s

assert 2e00=aaaaaaaa
assert psw=00003f

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVH
;; MOVH $0x3e08,$0x2e00
;;

d psw 0
d 2e00 aaaaaaaa
d pc 0

d -b 00 86
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 00
d -b 08 2e
d -b 09 00
d -b 0a 00
s

assert -w 2e00=f0f1aaaa

; Negative flag should be set
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVH
;; MOVH $0x3e08,$0x2e02
;;

d 2e00 aaaaaaaa

d pc 0
d -b 00 86
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 02
d -b 08 2e
d -b 09 00
d -b 0a 00
s

assert 2e00=aaaaf0f1
; Negative flag should be set
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVB
;; MOVB $0x3e08,$0x2e00
;;

d 2e00 aaaaaaaa

d pc 0
d -b 00 87
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 00
d -b 08 2e
d -b 09 00
d -b 0a 00
s

assert 2e00=f0aaaaaa
; Negative flag should be set
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVB
;; MOVB $0x3e08,$0x2e01
;;

d 2e00 aaaaaaaa

d pc 0
d -b 00 87
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 01
d -b 08 2e
d -b 09 00
d -b 0a 00
s

assert 2e00=aaf0aaaa
; Negative flag should be set
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVB
;; MOVB $0x3e08,$0x2e02
;;

d 2e00 aaaaaaaa

d pc 0
d -b 00 87
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 02
d -b 08 2e
d -b 09 00
d -b 0a 00
s

assert 2e00=aaaaf0aa
; Negative flag should be set
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Absolute MOVB
;; MOVB $0x3e08,$0x2e03
;;

d 2e00 aaaaaaaa

d pc 0
d -b 00 87
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 03
d -b 08 2e
d -b 09 00
d -b 0a 00
s

assert 2e00=aaaaaaf0
; Negative flag should be set
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Register MOVW - Privileged Register at USER level
;; MOVW $0x3e08,%pcbp

d pcbp 0
; Set current processor exec level to '3' for 'USER'
d psw 1804

d pc 0
d -b 00 84
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 4d
s

assert pcbp=0
assert psw=603f

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Register MOVW - Privileged Register at SUPERVISOR level
;; MOVW $0x3e08,%pcbp

d pcbp 0
; Set current processor exec level to '2' for 'SUPERVISOR'
d psw 1004

d pc 0
d -b 00 84
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 4d
s

assert pcbp=0
assert psw=403f

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Register MOVW - Privileged Register at EXECUTIVE level
;; MOVW $0x3e08,%pcbp

d pcbp 0
; Set current processor exec level to '1' for 'EXECUTIVE'
d psw 804

d pc 0
d -b 00 84
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 4d
s

assert pcbp=0
assert psw=203f


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Register MOVW - Privileged Register at KERNEL level
;; MOVW $0x3e08,%pcbp

d pcbp 0
; Set current processor exec level to '0' for 'KERNEL'
d psw 4

d pc 0
d -b 00 84
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 4d
s

assert pcbp=f0f1f2f3
assert psw=200004


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Register Deferred
;; MOVW $0x3e08,(%r1)

d 4a00 33
d r1 4a00

d pc 0
d -b 00 84
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 51
s

assert 4a00=f0f1f2f3
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVH - Register Deferred
;; MOVH $0x3e08,(%r1)

d 4a00 0
d r1 4a00

d pc 0
d -b 00 86
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 51
s

assert 4a00=f0f10000
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Register Deferred
;; MOVB $0x3e08,(%r1)

d 4a00 0
d r1 4a00

d pc 0
d -b 00 87
d -b 01 7F
d -b 02 08
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 51
s

assert 4a00=f0000000
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Byte Displacement
;; MOVW 8(%r1),%r0

d 4a04 89abcdef
d r1 4a00
d r0 0

d pc 0
d -b 00 84
d -b 01 c1
d -b 02 04
d -b 03 40
s

assert r0=89abcdef
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Byte Displacement Deferred
;; MOVW *8(%r1),%r0

d 6f00 55335533
d 4a04 6f00
d r1 4a00
d r0 0

d pc 0
d -b 00 84
d -b 01 d1
d -b 02 04
d -b 03 40
s

assert r0=55335533
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Halfword Displacement
;; MOVW 0x1200(%r1),%r0

d 5c00 89abcdef
d r1 4a00
d r0 0

d pc 0
d -b 00 84
d -b 01 a1
d -b 02 00
d -b 03 12
d -b 04 40
s

assert r0=89abcdef
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Halfword Displacement Deferred
;; MOVW *0x1200(%r1),%r0

d 3f00 55335533
d 2c00 3f00
d r1 1a00
d r0 0

d pc 0
d -b 00 84
d -b 01 b1
d -b 02 00
d -b 03 12
d -b 04 40
s

assert r0=55335533
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - AP Short Offset
;; MOVW 4(%ap),%r0

d 4804 ff11ff11
d ap 4800
d r0 0

d pc 0
d -b 00 84
d -b 01 74
d -b 02 40
s

assert r0=ff11ff11
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - FP Short Offset
;; MOVW 4(%fp),%r0

d 480C ff11ff11
d fp 4800
d r0 0

d pc 0
d -b 00 84
d -b 01 6C
d -b 02 40
s

assert r0=ff11ff11
assert psw=200004


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Byte Immediate
;; MOVW &1f,%r2

d r2 0

d pc 0
d -b 00 84
d -b 01 6F
d -b 02 1f
d -b 03 42
s

assert r2=1f
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Halfword Immediate
;; MOVW &1f2f,%r2

d r2 0

d pc 0
d -b 00 84
d -b 01 5F
d -b 02 2f
d -b 03 1f
d -b 04 42
s

assert r2=1f2f
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVW - Word Immediate
;; MOVW &1f2f3f4f,%r2

d r2 0

d pc 0
d -b 00 84
d -b 01 4f
d -b 02 4f
d -b 03 3f
d -b 04 2f
d -b 05 1f
d -b 06 42
s

assert r2=1f2f3f4f
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Positive Literal with Register Destination
;; MOVB &0,%r0

d r0 1f2f3f4f

d pc 0
d -b 00 87
d -b 01 00
d -b 02 40

s

;; Should have been zero-extended because the destination is a register.
assert r0=0
assert psw=100004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Negative Literal with Register Destination
;; MOVB &FA,%r0

d r0 1f2f3f4f

d pc 0
d -b 00 87
d -b 01 FA
d -b 02 40

s

;; Should have been sign-extended because the destination is a register.
assert r0=fffffffa
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Positive Literal with Memory Destination
;; MOVB &0xa,%(r0)

d 3f00 ffffffff
d r0 3f00

d pc 0
d -b 00 87
d -b 01 0a
d -b 02 50

s
;; Should NOT have been zero extended, because the destination is memory.
assert 3f00=0affffff
;; Negative and Zero flags should both be off
assert psw=4

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MOVB - Negative Literal with Memory Destination
;; MOVB &0xfa,(%r0)

d 3f00 0
d r0 3f00

d pc 0
d -b 00 87
d -b 01 FA
d -b 02 50

s

;; Should NOT have been sign extended, because the destination is memory.
assert 3f00=fa000000
;; Negative bit should be set because destination is a byte, an bit 7 is set.
assert psw=200004

:success
echo =======
echo SUCCESS
echo =======

quit

:failure
echo =======
echo FAILURE
echo =======
show history=10
