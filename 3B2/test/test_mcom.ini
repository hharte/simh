set cpu history=100

set quiet

set on
on afail goto failure

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Test Setup
;;

; Set up data for tests.

d 00002e00 aabbccdd
d 00003e00 11223344
d 00003e04 000000ff
d 00003e08 f0f1f2f3
d r0 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MCOMB - Absolute Address Mode
;; MCOMB $0x3e00,%r0

d pc 0
d -b 00 8B
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40
s

;; Register mode is always the full 32-bits
assert r0=FFFFFFEE
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MCOMB - Absolute Address Mode with Memory Dest
;; MCOMB $0x3e00,$0x4000

d pc 0
d -b 00 8B
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7F
d -b 07 00
d -b 08 40
d -b 09 00
d -b 0a 00
s
;; Memory mode only has the byte written
assert 4000=EE000000
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MCOMH - Absolute Address Mode
;; MCOMH $0x3E00,%r0

d pc 0
d -b 00 8A
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40
s
assert r0=ffffeedd
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MCOMW - Absolute Address Mode
;; MCOMW $0x3e00,%r0

d pc 0
d -b 00 88
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 40
s
assert r0=EEDDCCBB
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MCOMB - Absolute Address Mode
;; MCOMB $0x3e00,%0x2e00

d 2e00 0

d pc 0
d -b 00 8B
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7f
d -b 07 00
d -b 08 2e
d -b 09 00
d -b 0a 00
s
;; Writing to memory never sign-extends a byte
assert 2e00=EE000000
;; Negative flag is set because 'EE' is negative
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MCOMH - Absolute Address Mode
;; MCOMH $0x3e00,%0x2e00

d 2e00 0

d pc 0
d -b 00 8A
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7f
d -b 07 00
d -b 08 2e
d -b 09 00
d -b 0a 00
s
;; Writing to memory never sign-extends a byte
assert 2e00=EEDD0000
;; Negative flag is set because 'EEDD' is negative
assert psw=200004

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MCOMW - Absolute Address Mode
;; MCOMW $0x3e00,%0x2e00

d 2e00 0

d pc 0
d -b 00 88
d -b 01 7F
d -b 02 00
d -b 03 3e
d -b 04 00
d -b 05 00
d -b 06 7f
d -b 07 00
d -b 08 2e
d -b 09 00
d -b 0a 00
s
;; Writing to memory never sign-extends a byte
assert 2e00=EEDDCCBB
;; Negative flag is set because 'EEDDCCBB' is negative
assert psw=200004

:success
echo =======
echo SUCCESS
echo =======
quit

:failure
echo =======
echo FAILURE
echo =======
show history=10
