set debug stdout
set cpu debug=execute

set quiet

set on
on afail goto failure

d 3e20 2e20

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Test CLRW - Register Mode
;; CLRW %r1

d psw 0
d r0 12345678
d pc 0

d 00 80
d 01 40

s
;; Zero bit should be set
assert r0=0
assert psw=100004

:success
echo =======
echo SUCCESS
echo =======
quit

:failure
echo =======
echo FAILURE
echo =======
quit
