set cpu history=100

set quiet

set on
on afail goto failure

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; INSFW &11,&8,%r1,%r0
;; c8 0b 08 41 40

d pc 0
d r0 abcdef01
d r1 00000567

dep -b 0000 c8
dep -b 0001 0b
dep -b 0002 08
dep -b 0003 41
dep -b 0004 40

s

assert r0=abc56701

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; EXTFW &10,&4,%r1,%r0
;; cc 0a 04 41 40

d r0 00000000
d r1 01234567

dep -b 0005 cc
dep -b 0006 0a
dep -b 0007 04
dep -b 0008 41
dep -b 0009 40

s

assert r0=456

:success
echo =======
echo SUCCESS
echo =======

quit

:failure
echo =======
echo FAILURE
echo =======
show history=10
